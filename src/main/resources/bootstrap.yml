server:
  port: 8002
spring:
  application:
    name: onechain-onenft
  cloud:
    nacos:
      config:
        enabled: false
        server-addr: 127.0.0.1:8848
        refresh-enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/nft_new?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC&useSSL=false
    username: root
    password: abcd.1234
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1 FROM DUAL
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall,slf4j
      connection-properties: druid.stat.mergeSql=true;druid.stat.slowSqlMillis=5000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: io.xone.chain.onenft.entity
  configuration:
    map-underscore-to-camel-case: true
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: info

onechain:
  rpc-url: https://rpc-testnet.onelabs.cc:443
  faucet-url: https://faucet-testnet.onelabs.cc
  keystore-path: /Users/gdan/.one/one_config/one.keystore
  contract:
    package-id: 0x5ef40b735a3bf68b03314e0d40ff72dfa116ebe3d452c4a75eb40888491caf4a
    module-name: market